# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: rodrig011/pyh
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b75698a4-cb57-457b-8e0e-40b60c39e346/pkce
  auth_token_endpoint: /sites/b75698a4-cb57-457b-8e0e-40b60c39e346/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://sofisticated.lat

publish_mode: simple
media_folder: "src/images/uploads"
public_folder: "/images/uploads"

locale: "es"

collections:
  - name: "posts"
    label: "Posts del blog"
    label_singular: "Post"
    folder: "src/posts"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Título del post", name: "title", widget: "string", required: false }
      - label: "Categoría"
        name: "category"
        widget: "select"
        required: false
        options:
          - "Ingredients"
          - "Formulation"
          - "Skin Science"
          - "Naturals"
          - "Color Cosmetics"
          - "INCI Decoded"
          - "Actives"
      - label: "Emoji de la categoría"
        name: "categoryEmoji"
        widget: "string"
        default: "✨"
        required: false
        hint: "Un solo emoji para esta categoría (aparece en el filtro de arriba de los posts)"
      - label: "Emoji de la tarjeta"
        name: "emoji"
        widget: "string"
        default: "🧪"
        required: false
        hint: "Un emoji decorativo que aparece sobre la imagen de portada en la tarjeta"
      - label: "Resumen corto"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "1-2 frases. Esto se muestra en la tarjeta del post en la página principal"
      - label: "Imagen de portada"
        name: "image"
        widget: "image"
        required: false
        hint: "Arrastra una imagen aquí o haz clic para subirla"
      - label: "Fecha de publicación"
        name: "date"
        widget: "datetime"
        format: "yyyy-MM-dd"
        required: false
      - label: "Contenido del post"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Aquí escribes el post completo. Puedes poner negritas, títulos, listas e imágenes."

  - name: "settings"
    label: "Configuración del sitio"
    files:
      - name: "general"
        label: "Contenido general"
        file: "src/_data/site.json"
        fields:
          - label: "Barra de texto que se mueve arriba (ticker)"
            name: "ticker"
            widget: "list"
            required: false
            hint: "Palabras que se repiten en la barra negra de arriba del sitio. Una por línea."

          - label: "Enlaces del menú de navegación"
            name: "nav_links"
            widget: "list"
            required: false
            hint: "Las palabras que aparecen en el menú de arriba (Ingredients, Formulation, etc.)"

          - label: "Redes sociales y contacto"
            name: "social"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Link de Instagram", name: "instagram_url", widget: "string", required: false }
              - { label: "Usuario de Instagram (@...)", name: "instagram_handle", widget: "string", required: false }
              - { label: "Link de LinkedIn", name: "linkedin_url", widget: "string", required: false }
              - { label: "Correo de contacto", name: "email", widget: "string", required: false }

          - label: "Portada (Hero)"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Texto pequeño de arriba", name: "eyebrow", widget: "string", required: false }
              - { label: "Título — línea 1", name: "title_main", widget: "string", required: false }
              - { label: "Título — línea 2 (en cursiva, color rosa)", name: "title_emphasis", widget: "string", required: false }
              - { label: "Subtítulo", name: "subtitle", widget: "text", required: false }
              - { label: "Foto principal", name: "photo", widget: "image", required: false }
              - { label: "Fórmula química decorativa", name: "formula_code", widget: "string", required: false }
              - { label: "Texto bajo la fórmula", name: "formula_label", widget: "string", required: false }

          - label: "Sección Sobre mí (banner)"
            name: "about"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Foto circular", name: "photo", widget: "image", required: false }
              - { label: "Nombre", name: "name_main", widget: "string", required: false }
              - { label: "Apellido (en color rosa)", name: "name_emphasis", widget: "string", required: false }
              - { label: "Rol / estudios", name: "role", widget: "string", required: false }
              - label: "Frase / cita"
                name: "quote"
                widget: "text"
                required: false
                hint: "Puedes usar **texto** para ponerlo en negrita y color rosa"
              - label: "Insignias (badges)"
                name: "badges"
                widget: "list"
                required: false
                hint: "Una por línea, por ejemplo: 🇭🇳 From Honduras"

          - label: "Ingrediente destacado"
            name: "ingredient_spotlight"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Etiqueta pequeña", name: "label", widget: "string", required: false }
              - { label: "Título — línea 1", name: "title_main", widget: "string", required: false }
              - { label: "Título — línea 2 (en cursiva)", name: "title_emphasis", widget: "string", required: false }
              - { label: "Texto", name: "body", widget: "text", required: false }
              - { label: "Texto del botón", name: "link_text", widget: "string", required: false }
              - label: "Tarjetas (4 datos del ingrediente)"
                name: "tiles"
                widget: "list"
                required: false
                fields:
                  - { label: "Icono / emoji", name: "icon", widget: "string", required: false }
                  - { label: "Etiqueta", name: "tag", widget: "string", required: false }
                  - { label: "Nombre", name: "name", widget: "string", required: false }
                  - { label: "Descripción", name: "desc", widget: "text", required: false }

          - label: "Mi historia (sección con foto grande)"
            name: "profile"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Foto", name: "photo", widget: "image", required: false }
              - { label: "Texto pequeño de arriba", name: "eyebrow", widget: "string", required: false }
              - { label: "Título — línea 1", name: "title_main", widget: "string", required: false }
              - { label: "Título — línea 2 (en cursiva)", name: "title_emphasis", widget: "string", required: false }
              - { label: "Párrafo 1", name: "bio_1", widget: "text", required: false }
              - { label: "Párrafo 2", name: "bio_2", widget: "text", required: false }
              - label: "Estadísticas (3 números)"
                name: "stats"
                widget: "list"
                required: false
                fields:
                  - { label: "Número", name: "number", widget: "string", required: false }
                  - { label: "Descripción", name: "label", widget: "string", required: false }

          - label: "Fotos estilo Instagram"
            name: "instagram"
            widget: "object"
            collapsed: true
            fields:
              - label: "Fotos (6 recomendadas)"
                name: "images"
                widget: "list"
                required: false
                fields:
                  - { label: "Foto", name: "src", widget: "image", required: false }
                  - { label: "Emoji decorativo", name: "emoji", widget: "string", default: "✨", required: false }

          - label: "Newsletter"
            name: "newsletter"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Etiqueta pequeña", name: "eyebrow", widget: "string", required: false }
              - { label: "Título", name: "title", widget: "string", required: false }
              - { label: "Subtítulo", name: "subtitle", widget: "text", required: false }
              - { label: "Nota pequeña abajo", name: "note", widget: "string", required: false }
              - label: "Enlace del formulario (Mailchimp)"
                name: "form_action"
                widget: "string"
                required: false
                hint: "Pega aquí la URL de tu formulario de Mailchimp (Audience → Signup forms → Embedded forms → copia la URL que dice action=\"...\"). Mientras esté vacío, el botón de suscribirse no hará nada."

          - label: "Pie de página"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Descripción corta", name: "description", widget: "text", required: false }
              - { label: "Texto de copyright", name: "copyright", widget: "string", required: false }
